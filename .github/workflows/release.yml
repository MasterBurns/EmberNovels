name: Build and Release EmberNovels

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cross-platform:
    name: Build Standalone Executables
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: EmberNovels-Windows
            binary_name: EmberNovels.exe
            sep: ";"
          - os: ubuntu-latest
            artifact_name: EmberNovels-Linux
            binary_name: EmberNovels
            sep: ":"
          - os: macos-latest
            artifact_name: EmberNovels-macOS
            binary_name: EmberNovels
            sep: ":"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pydantic aiofiles python-multipart requests pyinstaller

      - name: Compile Standalone App (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onefile --add-data "frontend${{ matrix.sep }}frontend" --add-data "version.json${{ matrix.sep }}." run_app.py --name EmberNovels

      - name: Compile Standalone App (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --onefile --add-data "frontend${{ matrix.sep }}frontend" --add-data "version.json${{ matrix.sep }}." run_app.py --name EmberNovels

      # Windows Setup compilation using pre-installed Inno Setup
      - name: Compile Inno Setup Installer (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          iscc installer.iss

      # Zip/tar archives preparation
      - name: Package Linux Binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          cp EmberNovels.desktop dist/
          cp icon.jpg dist/
          cp install.sh dist/
          chmod +x dist/install.sh
          tar -czvf EmberNovels-Linux.tar.gz -C dist EmberNovels EmberNovels.desktop icon.jpg install.sh
          
          # Build Debian package
          mkdir -p debian-pkg/DEBIAN
          mkdir -p debian-pkg/usr/bin
          mkdir -p debian-pkg/usr/share/applications
          mkdir -p debian-pkg/usr/share/pixmaps
          
          cp dist/EmberNovels debian-pkg/usr/bin/
          cp EmberNovels.desktop debian-pkg/usr/share/applications/
          cp icon.jpg debian-pkg/usr/share/pixmaps/EmberNovels.jpg
          
          # Fix paths inside debian desktop entry
          sed -i "s|Icon=EmberNovels|Icon=/usr/share/pixmaps/EmberNovels.jpg|g" debian-pkg/usr/share/applications/EmberNovels.desktop
          sed -i "s|Exec=EmberNovels|Exec=/usr/bin/EmberNovels|g" debian-pkg/usr/share/applications/EmberNovels.desktop
          
          VERSION=$(python -c "import json; print(json.load(open('version.json'))['version'])")
          echo "Package: embernovels" > debian-pkg/DEBIAN/control
          echo "Version: $VERSION" >> debian-pkg/DEBIAN/control
          echo "Architecture: amd64" >> debian-pkg/DEBIAN/control
          echo "Maintainer: MasterBurns <https://github.com/MasterBurns>" >> debian-pkg/DEBIAN/control
          echo "Description: Modern desktop writing application with AI assistance." >> debian-pkg/DEBIAN/control
          echo "Section: office" >> debian-pkg/DEBIAN/control
          echo "Priority: optional" >> debian-pkg/DEBIAN/control
          echo "Depends: libc6" >> debian-pkg/DEBIAN/control

          dpkg-deb --build debian-pkg EmberNovels.deb


      - name: Package macOS Binary
        if: matrix.os == 'macos-latest'
        run: |
          zip -j EmberNovels-macOS.zip dist/EmberNovels

      - name: Package Windows Binary
        if: matrix.os == 'windows-latest'
        run: |
          Compress-Archive -Path dist/EmberNovels.exe -DestinationPath EmberNovels-Windows-Portable.zip

      # Upload artifacts using v4
      - name: Upload Windows Setup Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: EmberNovels-Windows-Installer
          path: output/EmberNovels-Setup.exe

      - name: Upload Portables Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            dist/${{ matrix.binary_name }}
            *.zip
            *.tar.gz
            *.deb


  create-release:
    name: Create GitHub Release
    needs: build-cross-platform
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: EmberNovels-Windows-Installer
          path: ./release-assets

      - name: Download Windows Portable
        uses: actions/download-artifact@v4
        with:
          name: EmberNovels-Windows
          path: ./release-assets

      - name: Download Linux Portable
        uses: actions/download-artifact@v4
        with:
          name: EmberNovels-Linux
          path: ./release-assets

      - name: Download macOS Portable
        uses: actions/download-artifact@v4
        with:
          name: EmberNovels-macOS
          path: ./release-assets

      - name: Extract Localized Release Notes
        id: release_notes
        shell: python
        run: |
          import json
          import os

          with open("version.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          notes = data.get("release_notes", {})
          body = []

          if isinstance(notes, dict):
              if "de" in notes:
                  body.append("## 🇩🇪 Release Notes (Deutsch)\n" + notes["de"])
              if "en" in notes:
                  body.append("\n## 🇺🇸 Release Notes (English)\n" + notes["en"])
          else:
              body.append(str(notes))

          full_body = "\n".join(body)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write("notes<<EOF\n" + full_body + "\nEOF\n")

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.release_notes.outputs.notes }}
          files: |
            release-assets/EmberNovels-Setup.exe
            release-assets/*.zip
            release-assets/*.tar.gz
            release-assets/*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

